<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3posher</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f8f8f8;
      --mid: #777;
      --border: #1e1e1e;
      --card-bg: #111;
      --sidebar-bg: #0d0d0d;
      --enquire: #22c55e;
      --enquire-dark: #16a34a;
      --nav-h: 60px;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP NAV ── */
    .top-nav {
      height: var(--nav-h);
      background: var(--black);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      gap: 0.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--white);
      text-decoration: none;
    }

    .nav-links { display: flex; gap: 0.3rem; align-items: center; }

    .top-nav-link {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: all 0.2s;
      cursor: pointer;
      background: none;
      font-family: 'Inter', sans-serif;
    }

    .top-nav-link:hover {
      color: var(--white);
      border-color: var(--border);
    }

    /* ── MAIN LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
    }

    /* ── LEFT SIDEBAR ── */
    .sidebar {
      width: 25%;
      min-width: 180px;
      max-width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      position: sticky;
      top: var(--nav-h);
      height: calc(100vh - var(--nav-h));
      overflow-y: auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .sidebar-section-title {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 0.8rem;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .cat-btn {
      background: transparent;
      border: none;
      color: var(--mid);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      text-align: left;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    .cat-btn:hover {
      background: #161616;
      color: var(--white);
    }

    .cat-btn.active {
      background: var(--white);
      color: var(--black);
      font-weight: 600;
    }

    .cat-count {
      font-size: 0.7rem;
      opacity: 0.5;
    }

    .cat-btn.active .cat-count {
      opacity: 0.6;
    }

    .sidebar-divider {
      border: none;
      border-top: 1px solid var(--border);
    }

    .sidebar-brand {
      margin-top: auto;
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem;
      color: #2a2a2a;
      letter-spacing: 0.08em;
    }

    /* ── RIGHT CONTENT ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HERO (center of content) ── */
    .hero {
      padding: 3rem 2.5rem 2.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1.2rem;
    }

    .hero-logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 6rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.02em;
    }

    .hero-logo em {
      font-style: italic;
      color: var(--mid);
    }

    .hero-sub {
      font-size: 0.8rem;
      color: var(--mid);
      letter-spacing: 0.05em;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.65rem 1.3rem;
      gap: 0.6rem;
      width: 100%;
      max-width: 420px;
      transition: border-color 0.2s;
    }

    .search-wrap:focus-within {
      border-color: #444;
    }

    .search-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      width: 100%;
    }

    .search-input::placeholder { color: #333; }

    .search-clear {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      line-height: 1;
      display: none;
    }

    /* ── PRODUCTS AREA ── */
    .products-area {
      flex: 1;
    }

    .products-bar {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .products-bar-title {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .products-bar-count {
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.08em;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-left: 1px solid var(--border);
    }

    .product-card {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      background: var(--black);
      transition: background 0.2s;
    }

    .product-card:hover { background: var(--card-bg); }
    .product-card:hover .card-img { transform: scale(1.04); }

    .card-img-wrap {
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: #0f0f0f;
      position: relative;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }

    .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      color: #1e1e1e;
    }

    .card-tag {
      position: absolute;
      top: 0.7rem;
      left: 0.7rem;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(10,10,10,0.88);
      color: var(--white);
      padding: 0.18rem 0.5rem;
      border-radius: 999px;
      border: 1px solid #2a2a2a;
    }

    .card-body {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .card-desc {
      font-size: 0.72rem;
      color: var(--mid);
      line-height: 1.5;
    }

    .card-price {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .enquire-btn {
      margin-top: 0.3rem;
      width: 100%;
      background: var(--enquire);
      color: #fff;
      border: none;
      padding: 0.6rem 0.5rem;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: background 0.2s, transform 0.1s;
      text-transform: uppercase;
    }

    .enquire-btn:hover { background: var(--enquire-dark); }
    .enquire-btn:active { transform: scale(0.98); }

    .wa-icon { width: 14px; height: 14px; fill: white; flex-shrink: 0; }

    .empty-state {
      grid-column: 1/-1;
      padding: 4rem 2rem;
      text-align: center;
      color: #333;
      font-size: 0.88rem;
    }



    /* ── MOBILE ── */
    .hero-cats {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hero-cat-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--mid);
      padding: 0.45rem 1.3rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    .hero-cat-btn:hover,
    .hero-cat-btn.active {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
      font-weight: 600;
    }
    .mobile-cats {
      display: none;
      overflow-x: auto;
      gap: 0.5rem;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .mobile-cats::-webkit-scrollbar { display: none; }
    .mobile-cat-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--mid);
      padding: 0.4rem 1.1rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .mobile-cat-btn.active,
    .mobile-cat-btn:hover {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
    }

    /* ── PRODUCT DETAIL OVERLAY ── */
    .pd-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .pd-overlay.open {
      display: flex;
    }
    .pd-sheet {
      background: #0d0d0d;
      width: 100%;
      max-width: 560px;
      max-height: 92vh;
      border-radius: 20px 20px 0 0;
      overflow-y: auto;
      padding-bottom: 2rem;
      animation: slideUp 0.3s cubic-bezier(.32,1.2,.6,1) both;
      scrollbar-width: none;
    }
    .pd-sheet::-webkit-scrollbar { display: none; }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .pd-back {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: none;
      border: none;
      color: var(--mid);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      padding: 1.2rem 1.5rem 0.5rem;
      cursor: pointer;
      text-transform: uppercase;
    }
    .pd-back svg { width: 16px; height: 16px; }
    .pd-back:hover { color: var(--white); }
    .pd-img-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      background: #111;
      overflow: hidden;
      position: relative;
    }
    .pd-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .pd-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      color: #222;
    }
    .pd-content {
      padding: 1.5rem 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .pd-brand {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #555;
    }
    .pd-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.15;
      color: var(--white);
    }
    .pd-avail {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: #22c55e;
      letter-spacing: 0.06em;
    }
    .pd-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
    }
    .pd-price {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.01em;
    }
    .pd-divider {
      border: none;
      border-top: 1px solid #1e1e1e;
      margin: 0.3rem 0;
    }
    .pd-desc-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
    }
    .pd-desc {
      font-size: 0.9rem;
      color: var(--mid);
      line-height: 1.7;
    }
    .pd-enquire-btn {
      width: 100%;
      background: #22c55e;
      color: white;
      border: none;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.4rem;
      transition: background 0.2s, transform 0.1s;
    }
    .pd-enquire-btn:hover { background: #16a34a; }
    .pd-enquire-btn:active { transform: scale(0.98); }

    /* ── SUB-FILTER BAR ── */
    .subfilter-bar {
      padding: 0.7rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: #0c0c0c;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .subfilter-bar::-webkit-scrollbar { display: none; }
    .subfilter-pills {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .subfilter-pill {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--mid);
      padding: 0.35rem 1rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: 0.06em;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .subfilter-pill:hover {
      color: var(--white);
      border-color: #444;
    }
    .subfilter-pill.active {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
      font-weight: 600;
    }

    @media (max-width: 720px) {
      .sidebar { display: none; }
      .mobile-cats { display: flex; }
      .product-grid { grid-template-columns: repeat(2, 1fr); }
      .hero { padding: 2rem 1rem 1.5rem; }
      .subfilter-pills { flex-wrap: nowrap; }
    }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="top-nav">
    <a class="nav-logo" href="#">3posher</a>
    <div class="nav-links">
      <button class="top-nav-link" onclick="setCategory('all',null);scrollToProducts()">Home</button>
      <button class="top-nav-link">About</button>
      <button class="top-nav-link" onclick="openWhatsApp()">Contact</button>
    </div>
  </nav>

  <div class="layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div>
        <p class="sidebar-section-title">Categories</p>
        <div class="category-list" id="cat-list">
          <!-- Injected by JS -->
        </div>
      </div>

      <hr class="sidebar-divider"/>

      <div>
        <p class="sidebar-section-title">Price Range</p>
        <div class="category-list">
          <button class="cat-btn" onclick="filterPrice('all', this)">All Prices</button>
          <button class="cat-btn" onclick="filterPrice('0to500', this)">₹0 – ₹500</button>
          <button class="cat-btn" onclick="filterPrice('500to1000', this)">₹500 – ₹1,000</button>
          <button class="cat-btn" onclick="filterPrice('1000to1500', this)">₹1,000 – ₹1,500</button>
          <button class="cat-btn" onclick="filterPrice('above2000', this)">Above ₹2,000</button>
        </div>
      </div>

      <p class="sidebar-brand">3posher</p>
    </aside>

    <!-- RIGHT CONTENT -->
    <div class="content">

      <!-- HERO -->
      <section class="hero">
        <div class="hero-logo">3<em>posher</em></div>
        <p class="hero-sub">Premium shoes &amp; clothes</p>
        <div class="search-wrap">
          <span style="color:#444;font-size:0.95rem">🔍</span>
          <input class="search-input" id="search-input" type="text" placeholder="Search products…" oninput="handleSearch(this.value)"/>
          <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
        </div>
        <!-- CATEGORY PILLS -->
        <div class="hero-cats">
          <button class="hero-cat-btn active" onclick="setCategory('all', this, true)">All</button>
          <button class="hero-cat-btn" onclick="setCategory('shoes', this, true)">👟 Shoes</button>
          <button class="hero-cat-btn" onclick="setCategory('clothes', this, true)">👕 Clothes</button>
        </div>
      </section>

      <!-- PRODUCTS -->
      <div class="products-area">
        <div class="products-bar">
          <span class="products-bar-title" id="bar-title">All Products</span>
          <span class="products-bar-count" id="bar-count"></span>
        </div>
        <!-- SUB-FILTER PILLS -->
        <div class="subfilter-bar" id="subfilter-bar" style="display:none;">
          <div class="subfilter-pills" id="subfilter-pills"></div>
        </div>
        <div class="product-grid" id="product-grid"></div>
      </div>

    </div>
  </div>



  <script>
    // ── CONFIG ──────────────────────────────────────────────
    const WHATSAPP_NUMBER = "918714463588"; // ← replace with your number

    // ── PRODUCTS ────────────────────────────────────────────
    // image: "" → shows emoji placeholder
    // image: "images/shoe1.jpg" → shows real photo
    // ╔══════════════════════════════════════════════════════════════════╗
    // ║  HOW TO ADD A NEW PRODUCT                                       ║
    // ║                                                                  ║
    // ║  1. Copy the template block below (lines marked TEMPLATE)       ║
    // ║  2. Paste it inside the products = [ ] array                    ║
    // ║  3. Change every value marked  ← CHANGE                        ║
    // ║  4. Make sure the id is unique (keep counting up: 7, 8, 9…)    ║
    // ║  5. Save the file — product.html updates automatically          ║
    // ╚══════════════════════════════════════════════════════════════════╝
    //
    // ── PRODUCT TEMPLATE (copy from here) ──────────────────────────────
    //
    // { id:7,                                  ← CHANGE: next number in sequence
    //   name:    "Product Name",               ← CHANGE: product name
    //   brand:   "Brand Name",                 ← CHANGE: brand (Adidas / Nike / etc.)
    //   category:"shoes",                      ← CHANGE: "shoes" or "clothes"
    //   price:   "₹999",                       ← CHANGE: price with ₹ symbol
    //   priceVal: 999,                         ← CHANGE: same number without ₹ (for filters)
    //   desc:    "Write your description here. Keep it short and clear.", // ← CHANGE
    //   image:   "",                           ← CHANGE: paste image URL here, or leave "" for emoji
    //   emoji:   "👟",                         ← CHANGE: emoji shown when no image (👟👠👕👖🧥👗)
    // },
    //
    // ── END OF TEMPLATE ────────────────────────────────────────────────

    // Sub-brands per category
    const subBrands = {
      shoes:   ["All", "Adidas", "Nike", "New Balance", "Puma", "Reebok"],
      clothes: ["All", "H&M", "Zara", "Puma", "Levi's", "Uniqlo"],
    };

    const categories = [
      { key:"all",     label:"All",     emoji:"✦" },
      { key:"shoes",   label:"Shoes",   emoji:"👟" },
      { key:"clothes", label:"Clothes", emoji:"👕" },
    ];

    // ── BUILD SIDEBAR CATS ───────────────────────────────────
    function buildSidebar() {
      const list = document.getElementById("cat-list");
      list.innerHTML = categories.map(c => {
        const count = c.key === "all" ? products.length : products.filter(p => p.category === c.key).length;
        return `<button class="cat-btn ${c.key === activeCategory ? 'active' : ''}"
          onclick="setCategory('${c.key}', this)">
          <span>${c.emoji} ${c.label}</span>
          <span class="cat-count">${count}</span>
        </button>`;
      }).join("");
    }

    // ── FILTER ──────────────────────────────────────────────
    function getFiltered() {
      return products.filter(p => {
        const catOk = activeCategory === "all" || p.category === activeCategory;
        const searchOk = !searchQuery ||
          p.name.toLowerCase().includes(searchQuery) ||
          p.desc.toLowerCase().includes(searchQuery);
        let priceOk = true;
        if (activePriceFilter === "0to500")      priceOk = p.priceVal >= 0 && p.priceVal <= 500;
        if (activePriceFilter === "500to1000")   priceOk = p.priceVal > 500 && p.priceVal <= 1000;
        if (activePriceFilter === "1000to1500")  priceOk = p.priceVal > 1000 && p.priceVal <= 1500;
        if (activePriceFilter === "above2000")   priceOk = p.priceVal > 2000;
        const brandOk = activeBrand === "all" || (p.brand && p.brand.toLowerCase() === activeBrand.toLowerCase());
        return catOk && searchOk && priceOk && brandOk;
      });
    }

    // ── SUB-FILTER BUILDER ──────────────────────────────────
    function buildSubfilter() {
      const bar = document.getElementById("subfilter-bar");
      const pills = document.getElementById("subfilter-pills");
      const brands = subBrands[activeCategory];
      if (!brands || activeCategory === "all") {
        bar.style.display = "none";
        activeBrand = "all";
        return;
      }
      bar.style.display = "block";
      pills.innerHTML = brands.map(b => {
        const key = b === "All" ? "all" : b;
        const isActive = activeBrand.toLowerCase() === key.toLowerCase();
        return `<button class="subfilter-pill ${isActive ? 'active' : ''}"
          onclick="setBrand('${key}', this)">${b}</button>`;
      }).join("");
    }

    // ── RENDER ──────────────────────────────────────────────
    function render() {
      const grid    = document.getElementById("product-grid");
      const title   = document.getElementById("bar-title");
      const counter = document.getElementById("bar-count");
      const filtered = getFiltered();

      const labels = { all:"All Products", shoes:"Shoes", clothes:"Clothes" };
      title.textContent = searchQuery ? `Results for "${searchQuery}"` : labels[activeCategory];
      counter.textContent = `${filtered.length} item${filtered.length !== 1 ? "s" : ""}`;

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state">Nothing found — try adjusting your search or filters.</div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="product-card" onclick="goToProduct(${p.id})" style="cursor:pointer;">
          <div class="card-img-wrap">
            ${p.image
              ? `<img class="card-img" src="${p.image}" alt="${p.name}" loading="lazy"/>`
              : `<div class="card-placeholder">${p.emoji}</div>`}
            <span class="card-tag">${p.category}</span>
          </div>
          <div class="card-body">
            <div class="card-name">${p.name}</div>
            <div class="card-desc">${p.desc}</div>
            <div class="card-price">${p.price}</div>
            <button class="enquire-btn" onclick="event.stopPropagation(); enquire(${p.id})">
              <svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                <path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.563 4.14 1.534 5.876L0 24l6.303-1.518A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.023-1.378l-.36-.214-3.742.9.938-3.63-.236-.374A9.818 9.818 0 1112 21.818z"/>
              </svg>
              Enquire on WhatsApp
            </button>
          </div>
        </div>
      `).join("");
    }

    // ── ACTIONS ─────────────────────────────────────────────
    function setCategory(cat, btn, isMobile) {
      activeCategory = cat;
      activeBrand = "all";
      buildSidebar();
      buildSubfilter();
      // sync hero pills
      document.querySelectorAll(".hero-cat-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".mobile-cat-btn").forEach(b => b.classList.remove("active"));
      if (btn) btn.classList.add("active");
      render();
    }

    function setBrand(brand, btn) {
      activeBrand = brand;
      document.querySelectorAll(".subfilter-pill").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    }

    function filterPrice(range, btn) {
      activePriceFilter = range;
      document.querySelectorAll(".sidebar .category-list:nth-child(2) .cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    }

    function handleSearch(val) {
      searchQuery = val.trim().toLowerCase();
      document.getElementById("search-clear").style.display = val ? "block" : "none";
      render();
    }

    function clearSearch() {
      document.getElementById("search-input").value = "";
      document.getElementById("search-clear").style.display = "none";
      searchQuery = "";
      render();
    }

    function enquire(id) {
      const p = products.find(pr => pr.id === id);
      if (!p) return;
      const imgLine = (p.image && p.image.startsWith("http"))
        ? `\n🖼 Product image: ${p.image}` : "";
      const msg =
        `Hi 3posher! 👋\n\n` +
        `I'm interested in:\n` +
        `*${p.name}*\n` +
        `Brand: ${p.brand || p.category}\n` +
        `Price: ${p.price}\n\n` +
        `📝 ${p.desc}` +
        imgLine +
        `\n\nCould you share more details? 🙏`;
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, "_blank");
    }

    function goToProduct(id) {
      // Store selected product id so product.html can read it
      sessionStorage.setItem("3posher_product_id", id);
      window.location.href = "product.html";
    }

    // ── PRODUCT DETAIL ───────────────────────────────────────
    function openPD(id) {
      const p = products.find(pr => pr.id === id);
      if (!p) return;

      // Fill image
      const imgWrap = document.getElementById("pd-img-wrap");
      imgWrap.innerHTML = p.image
        ? `<img src="${p.image}" alt="${p.name}"/>`
        : `<div class="pd-img-placeholder">${p.emoji}</div>`;

      // Fill text
      document.getElementById("pd-brand").textContent = (p.brand || p.category).toUpperCase();
      document.getElementById("pd-name").textContent = p.name;
      document.getElementById("pd-price").textContent = p.price;
      document.getElementById("pd-desc").textContent = p.desc;

      // Wire enquire button
      const btn = document.getElementById("pd-enquire-btn");
      btn.onclick = () => enquire(p.id);

      // Open overlay
      const overlay = document.getElementById("pd-overlay");
      overlay.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closePD(e) {
      if (e.target === document.getElementById("pd-overlay")) closePDBtn();
    }

    function closePDBtn() {
      document.getElementById("pd-overlay").classList.remove("open");
      document.body.style.overflow = "";
    }

    function openWhatsApp() {
      window.open(`https://wa.me/${WHATSAPP_NUMBER}`, "_blank");
    }

    function scrollToProducts() {
      document.querySelector(".products-area").scrollIntoView({ behavior: "smooth" });
    }

    // ── INIT ────────────────────────────────────────────────
    buildSidebar();
    buildSubfilter();
    render();
  </script>

  <!-- ── PRODUCT DETAIL OVERLAY ── -->
  <div class="pd-overlay" id="pd-overlay" onclick="closePD(event)">
    <div class="pd-sheet" id="pd-sheet">

      <!-- Back button -->
      <button class="pd-back" onclick="closePDBtn()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </button>

      <!-- Image area -->
      <div class="pd-img-wrap" id="pd-img-wrap"></div>

      <!-- Content -->
      <div class="pd-content">
        <div class="pd-brand" id="pd-brand"></div>
        <div class="pd-name" id="pd-name"></div>
        <div class="pd-avail">
          <span class="pd-dot"></span> In Stock
        </div>
        <div class="pd-price" id="pd-price"></div>
        <div class="pd-divider"></div>
        <div class="pd-desc-label">Description</div>
        <div class="pd-desc" id="pd-desc"></div>
        <div class="pd-divider"></div>
        <button class="pd-enquire-btn" id="pd-enquire-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px;fill:white;flex-shrink:0">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
            <path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.563 4.14 1.534 5.876L0 24l6.303-1.518A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.023-1.378l-.36-.214-3.742.9.938-3.63-.236-.374A9.818 9.818 0 1112 21.818z"/>
          </svg>
          Enquire on WhatsApp
        </button>
      </div>

    </div>
  </div>

</body>
</html>
