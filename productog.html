<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — 3posher</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #0a0a0a;
      --white:   #f8f8f8;
      --mid:     #777;
      --border:  #1e1e1e;
      --green:   #22c55e;
      --green-d: #16a34a;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── TOP NAV ── */
    .top-nav {
      height: 60px;
      background: var(--black);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .nav-back {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: none;
      color: var(--mid);
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--white); }
    .nav-back svg { width: 16px; height: 16px; }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--white);
      text-decoration: none;
    }
    .nav-spacer { width: 60px; }

    /* ── PAGE ── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 0 4rem;
    }

    /* ══════════════════════════════════════
       IMAGE GALLERY
    ══════════════════════════════════════ */
    .gallery {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #111;
      overflow: hidden;
    }
    .gallery-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    }
    .gallery-slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: hidden;
    }
    .gallery-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .gallery-slide .placeholder-emoji {
      font-size: 7rem;
      color: #222;
    }

    /* Arrow buttons */
    .gallery-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(10,10,10,0.75);
      border: 1px solid #2a2a2a;
      color: var(--white);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s, opacity 0.3s;
      backdrop-filter: blur(6px);
    }
    .gallery-arrow:hover { background: rgba(30,30,30,0.95); }
    .gallery-arrow svg { width: 18px; height: 18px; }
    .gallery-arrow.prev { left: 0.9rem; }
    .gallery-arrow.next { right: 0.9rem; }
    .gallery-arrow.hidden { opacity: 0; pointer-events: none; }

    /* Dot indicators */
    .gallery-dots {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.45rem;
    }
    .gallery-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .gallery-dot.active {
      background: var(--white);
      transform: scale(1.35);
    }

    /* ══════════════════════════════════════
       PRODUCT INFO
    ══════════════════════════════════════ */
    .product-info {
      padding: 1.8rem 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .product-brand {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #555;
    }
    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
    }
    .product-avail {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.75rem;
      color: var(--green);
      letter-spacing: 0.06em;
    }
    .avail-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .product-price {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.3rem 0;
    }
    .section-label {
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 0.2rem;
    }
    .product-desc {
      font-size: 0.92rem;
      color: var(--mid);
      line-height: 1.8;
    }
    .details-table { display: flex; flex-direction: column; }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid #161616;
    }
    .detail-key { color: #555; }
    .detail-val { color: var(--white); font-weight: 500; }

    /* ── BUTTONS ── */
    .enquire-wrap {
      padding: 1.5rem 1.5rem 0;
    }
    .enquire-btn {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      padding: 1rem 1.2rem;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      transition: background 0.2s, transform 0.1s;
    }
    .enquire-btn:hover  { background: var(--green-d); }
    .enquire-btn:active { transform: scale(0.98); }
    .enquire-btn svg { width: 20px; height: 20px; fill: white; flex-shrink: 0; }

    .secondary-actions {
      display: flex;
      gap: 0.8rem;
      padding: 0.8rem 1.5rem 0;
    }
    .share-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--mid);
      padding: 0.75rem;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: all 0.2s;
    }
    .share-btn:hover { border-color: #444; color: var(--white); }
    .share-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    @media (max-width: 600px) {
      .product-name  { font-size: 1.5rem; }
      .product-price { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav class="top-nav">
    <a class="nav-back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back
    </a>
    <a class="nav-logo" href="index.html">3posher</a>
    <div class="nav-spacer"></div>
  </nav>

  <div class="page">

    <!-- ══════════════════════════════════════════════════════
         IMAGE GALLERY  — arrows + dots + swipe on mobile
    ══════════════════════════════════════════════════════ -->
    <div class="gallery" id="gallery">
      <div class="gallery-track" id="gallery-track">
        <!-- Slides built by JS from product.images[] below -->
      </div>

      <button class="gallery-arrow prev hidden" id="arrow-prev" onclick="prevSlide()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <button class="gallery-arrow next" id="arrow-next" onclick="nextSlide()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <div class="gallery-dots" id="gallery-dots"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════
         PRODUCT INFO
    ══════════════════════════════════════════════════════ -->
    <div class="product-info">

      <div class="product-brand"  id="product-brand"></div>
      <div class="product-name"   id="product-name"></div>

      <div class="product-avail">
        <span class="avail-dot"></span>
        <span id="product-avail">In Stock</span>
      </div>

      <div class="product-price" id="product-price"></div>

      <div class="divider"></div>

      <div class="section-label">Description</div>
      <!-- ↓ Description is filled from product.desc in the script below -->
      <p class="product-desc" id="product-desc"></p>

      <div class="divider"></div>

      <div class="section-label">Details</div>
      <div class="details-table" id="details-table">
        <!-- Rows built by JS from product.details[] below -->
      </div>

    </div>

    <!-- ── ENQUIRY BUTTON ── -->
    <div class="enquire-wrap">
      <button class="enquire-btn" onclick="enquireOnWhatsApp()">

        </svg>
        Enquire on WhatsApp
      </button>
    </div>

    <!-- ── SHARE / COPY ── -->
    <div class="secondary-actions">
      <button class="share-btn" onclick="shareProduct()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        Share
      </button>
      <button class="share-btn" id="copy-btn" onclick="copyLink()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        Copy Link
      </button>
    </div>

  </div><!-- /page -->

            // { src: "", alt: raw.name + " - view 2" },
          ]
        : [
            { src: "", alt: raw.name },
          ],
      details: [
        { key: "Brand",    val: raw.brand || raw.category },
        { key: "Category", val: raw.category },
        // ↓ ADD more detail rows here — they appear in the table on the product page
        // Just uncomment and fill in:
        // { key: "Available Sizes", val: "UK 6, 7, 8, 9, 10" },
        // { key: "Colour",          val: "Orange / White" },
        // { key: "Material",        val: "Suede & Mesh" },
        // { key: "Condition",       val: "Brand New" },
      ],
    };

    // ╔══════════════════════════════════════════════════════════════════╗
    // ║  HOW TO ADD MULTIPLE IMAGES PER PRODUCT                        ║
    // ║                                                                  ║
    // ║  The images[] above auto-fills from the home page image.        ║
    // ║  To add MORE images for a specific product, find its id below   ║
    // ║  and list as many image URLs as you want.                       ║
    // ║                                                                  ║
    // ║  Example — for product id 1 (New Balance x Kith):              ║
    // ║  if (raw.id === 1) {                                            ║
    // ║    product.images = [                                           ║
    // ║      { src: "https://…/nb-front.jpg",  alt: "Front view" },    ║
    // ║      { src: "https://…/nb-side.jpg",   alt: "Side view"  },    ║
    // ║      { src: "https://…/nb-detail.jpg", alt: "Detail"     },    ║
    // ║    ];                                                           ║
    // ║  }                                                              ║
    // ║                                                                  ║
    // ║  Copy that block below and repeat for each product id.          ║
    // ╚══════════════════════════════════════════════════════════════════╝

    // ↓ ADD EXTRA IMAGES PER PRODUCT HERE:
    // if (raw.id === 1) { product.images = [ {src:"URL1",alt:"view1"}, {src:"URL2",alt:"view2"} ]; }
    // if (raw.id === 2) { product.images = [ {src:"URL1",alt:"view1"}, {src:"URL2",alt:"view2"} ]; }
    // if (raw.id === 3) { product.images = [ {src:"URL1",alt:"view1"}, {src:"URL2",alt:"view2"} ]; }

    
    // ╔══════════════════════════════════════════════════════════╗
    // ║  GALLERY — no changes needed below                      ║
    // ╚══════════════════════════════════════════════════════════╝
    let currentSlide = 0;
    const track   = document.getElementById("gallery-track");
    const dotsEl  = document.getElementById("gallery-dots");
    const btnPrev = document.getElementById("arrow-prev");
    const btnNext = document.getElementById("arrow-next");

    function buildGallery() {
      // Filter to slides that have an src OR show emoji placeholder
      const slides = product.images.length ? product.images : [{ src: "", alt: "" }];

      track.innerHTML = slides.map((img, i) => {
        const hasImg = img.src && img.src.trim() !== "";
        return `<div class="gallery-slide">
          ${hasImg
            ? `<img src="${img.src}" alt="${img.alt}" loading="${i === 0 ? 'eager' : 'lazy'}"/>`
            : `<span class="placeholder-emoji">${product.emoji}</span>`}
        </div>`;
      }).join("");

      // Dots — only show if more than 1 slide
      if (slides.length > 1) {
        dotsEl.innerHTML = slides.map((_, i) =>
          `<div class="gallery-dot${i === 0 ? ' active' : ''}" onclick="goToSlide(${i})"></div>`
        ).join("");
        dotsEl.style.display = "flex";
      } else {
        dotsEl.style.display = "none";
      }

      updateArrows(slides.length);
    }

    function goToSlide(n) {
      const total = product.images.length || 1;
      currentSlide = Math.max(0, Math.min(n, total - 1));
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      document.querySelectorAll(".gallery-dot").forEach((d, i) =>
        d.classList.toggle("active", i === currentSlide)
      );
      updateArrows(total);
    }

    function prevSlide() { goToSlide(currentSlide - 1); }
    function nextSlide() { goToSlide(currentSlide + 1); }

    function updateArrows(total) {
      btnPrev.classList.toggle("hidden", currentSlide === 0);
      btnNext.classList.toggle("hidden", currentSlide >= total - 1);
    }

    // Swipe support for mobile
    let touchStartX = 0;
    document.getElementById("gallery").addEventListener("touchstart", e => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    document.getElementById("gallery").addEventListener("touchend", e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) diff > 0 ? nextSlide() : prevSlide();
    });


    // ╔══════════════════════════════════════════════════════════╗
    // ║  FILL PAGE WITH PRODUCT DATA                            ║
    // ╚══════════════════════════════════════════════════════════╝
    function fillPage() {
      document.title = `${product.name} — 3posher`;
      document.getElementById("product-brand").textContent = product.brand.toUpperCase();
      document.getElementById("product-name").textContent  = product.name;
      document.getElementById("product-price").textContent = product.price;
      document.getElementById("product-avail").textContent = product.avail;
      document.getElementById("product-desc").textContent  = product.desc;

      // Build details table
      const table = document.getElementById("details-table");
      table.innerHTML = product.details.map(row =>
        `<div class="detail-row">
           <span class="detail-key">${row.key}</span>
           <span class="detail-val">${row.val}</span>
         </div>`
      ).join("");

      // Availability colour — red if out of stock
      if (product.avail.toLowerCase().includes("out")) {
        document.querySelector(".avail-dot").style.background = "#ef4444";
        document.getElementById("product-avail").style.color = "#ef4444";
      }
    }


    // ╔══════════════════════════════════════════════════════════╗
    // ║  WHATSAPP ENQUIRY MESSAGE                               ║
    // ║  WhatsApp only supports text. The product page link     ║
    // ║  is sent so you and the customer can reference the      ║
    // ║  exact item. If the image is a public URL it is also    ║
    // ║  included so WhatsApp can show a preview.               ║
    // ╚══════════════════════════════════════════════════════════╝
    function enquireOnWhatsApp() {
      const pageLink = window.location.href;

      // Get first image that is a real public URL (not base64, not empty)
      const firstPublicImg = product.images.find(img =>
        img.src && img.src.startsWith("http")
      );
      const imgLine = firstPublicImg
        ? `\n🖼 Product image: ${firstPublicImg.src}`
        : "";

      // ↓ CHANGE THIS MESSAGE if you want different wording
      const msg =
        `Hi 3posher! 👋\n\n` +
        `I'm interested in:\n` +
        `*${product.name}*\n` +
        `Brand: ${product.brand}\n` +
        `Price: ${product.price}\n` +
        `Category: ${product.category}\n\n` +
        `📝 Description:\n${product.desc}\n\n` +
        `🔗 Product page: ${pageLink}` +
        imgLine +
        `\n\nCould you please share more details? 🙏`;

      window.open(
        `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`,
        "_blank"
      );
    }


    // ── SHARE & COPY LINK ─────────────────────────────────────
    function shareProduct() {
      if (navigator.share) {
        navigator.share({
          title: product.name,
          text: `${product.name} — ${product.price} | 3posher`,
          url: window.location.href,
        });
      } else {
        copyLink();
      }
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById("copy-btn");
        const orig = btn.innerHTML;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        btn.style.color = "#22c55e";
        btn.style.borderColor = "#22c55e";
        setTimeout(() => { btn.innerHTML = orig; btn.style.color = ""; btn.style.borderColor = ""; }, 2000);
      }).catch(() => {
        alert("Copy this link: " + window.location.href);
      });
    }


    // ── INIT ──────────────────────────────────────────────────
    fillPage();
    buildGallery();
  </script>
</body>
</html>
