<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — 3posher</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #0a0a0a;
      --white:   #f8f8f8;
      --mid:     #777;
      --border:  #1e1e1e;
      --green:   #22c55e;
      --green-d: #16a34a;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── TOP NAV ── */
    .top-nav {
      height: 60px;
      background: var(--black);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .nav-back {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: none;
      color: var(--mid);
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--white); }
    .nav-back svg { width: 16px; height: 16px; }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--white);
      text-decoration: none;
    }
    .nav-spacer { width: 60px; }

    /* ── PAGE ── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 0 4rem;
    }

    /* ══════════════════════════════════════
       IMAGE GALLERY
    ══════════════════════════════════════ */
    .gallery {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #111;
      overflow: hidden;
    }
    .gallery-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    }
    .gallery-slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: hidden;
    }
    .gallery-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Prevents image zooming/cropping across standard orientations */
      display: block;
    }
    .gallery-slide .placeholder-emoji {
      font-size: 7rem;
      color: #222;
    }

    /* Arrow buttons */
    .gallery-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(10,10,10,0.75);
      border: 1px solid #2a2a2a;
      color: var(--white);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s, opacity 0.3s;
      backdrop-filter: blur(6px);
    }
    .gallery-arrow:hover { background: rgba(30,30,30,0.95); }
    .gallery-arrow svg { width: 18px; height: 18px; }
    .gallery-arrow.prev { left: 0.9rem; }
    .gallery-arrow.next { right: 0.9rem; }
    .gallery-arrow.hidden { opacity: 0; pointer-events: none; }

    /* Dot indicators */
    .gallery-dots {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.45rem;
    }
    .gallery-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .gallery-dot.active {
      background: var(--white);
      transform: scale(1.35);
    }

    /* ══════════════════════════════════════
       PRODUCT INFO
    ══════════════════════════════════════ */
    .product-info {
      padding: 1.8rem 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .product-brand {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #555;
    }
    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
    }
    .product-avail {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.75rem;
      color: var(--green);
      letter-spacing: 0.06em;
    }
    .avail-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .product-price {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.3rem 0;
    }
    .section-label {
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 0.2rem;
    }
    .product-desc {
      font-size: 0.92rem;
      color: var(--mid);
      line-height: 1.8;
    }
    .details-table { display: flex; flex-direction: column; }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid #161616;
    }
    .detail-key { color: #555; }
    .detail-val { color: var(--white); font-weight: 500; }

    /* ── BUTTONS ── */
    .enquire-wrap {
      padding: 1.5rem 1.5rem 0;
    }
    .enquire-btn {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      padding: 1rem 1.2rem;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      transition: background 0.2s, transform 0.1s;
    }
    .enquire-btn:hover  { background: var(--green-d); }
    .enquire-btn:active { transform: scale(0.98); }
    .enquire-btn svg { width: 20px; height: 20px; fill: white; flex-shrink: 0; }

    .secondary-actions {
      display: flex;
      gap: 0.8rem;
      padding: 0.8rem 1.5rem 0;
    }
    .share-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--mid);
      padding: 0.75rem;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: all 0.2s;
    }
    .share-btn:hover { border-color: #444; color: var(--white); }
    .share-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    @media (max-width: 600px) {
      .product-name  { font-size: 1.5rem; }
      .product-price { font-size: 1.4rem; }
    }

    /* ── SIZE SELECTOR ── */
    .size-section { padding: 0; }
    .size-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .size-btn {
      min-width: 48px;
      padding: 0.5rem 0.75rem;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: var(--mid);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .size-btn:hover { border-color: #555; color: var(--white); }
    .size-btn.active {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
      font-weight: 600;
    }
    .size-btn.unavailable {
      opacity: 0.25;
      cursor: not-allowed;
      text-decoration: line-through;
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a class="nav-back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back
    </a>
    <a class="nav-logo" href="index.html">3posher</a>
    <div class="nav-spacer"></div>
  </nav>

  <div class="page">

    <div class="gallery" id="gallery">
      <div class="gallery-track" id="gallery-track">
        </div>

      <button class="gallery-arrow prev hidden" id="arrow-prev" onclick="prevSlide()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <button class="gallery-arrow next" id="arrow-next" onclick="nextSlide()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <div class="gallery-dots" id="gallery-dots"></div>
    </div>

    <div class="product-info">

      <div class="product-brand"  id="product-brand"></div>
      <div class="product-name"   id="product-name"></div>

      <div class="product-avail">
        <span class="avail-dot"></span>
        <span id="product-avail">In Stock</span>
      </div>

      <div class="product-price" id="product-price"></div>

      <div class="divider"></div>

      <div class="section-label">Description</div>
      <p class="product-desc" id="product-desc"></p>

      <div class="divider"></div>

      <div class="section-label">Select Size</div>
      <div class="size-grid" id="size-grid">
        </div>

      <div class="divider"></div>

      <div class="section-label">Details</div>
      <div class="details-table" id="details-table">
        </div>

    </div>

    <div class="enquire-wrap">
      <button class="enquire-btn" onclick="enquireOnWhatsApp()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.563 4.14 1.534 5.876L0 24l6.303-1.518A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.023-1.378l-.36-.214-3.742.9.938-3.63-.236-.374A9.818 9.818 0 1112 21.818z"/>
        </svg>
        Enquire on WhatsApp
      </button>
    </div>

    <div class="secondary-actions">
      <button class="share-btn" onclick="shareProduct()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        Share
      </button>
      <button class="share-btn" id="copy-btn" onclick="copyLink()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        Copy Link
      </button>
    </div>

  </div><script>
    const WHATSAPP_NUMBER = "918714463588";

    const products = [

      // ── ADDED VIA ADMIN PANEL ─────────────────────────────────
      { id:1782297956, name:"Onitsuka Tiger Mexico 66", category:"Shoes", brand:"Onitsuka Tiger", price:"₹1099", priceVal:1099, desc:"Onitsuka Tiger Mexico 66 Yellow colour", image:"Onitsukay1.webp", images: ["Onitsukay1.webp", "Onitsukay2.jpg", "Onitsukay3.webp"], emoji:"👟", sizes: ["IN 6", "IN 7", "IN 8", "IN 9", "IN 10"] },
      // ── ADDED VIA ADMIN PANEL ─────────────────────────────────
      { id:1782239242, name:"Boxer Shirt", category:"clothes", brand:"", price:"₹399", priceVal:399, desc:"Boxer full sleeve shirt with back print", image:"boxer4.jpeg", images: ["boxer4.jpeg", "boxer4.jpeg"], emoji:"👕", sizes: [] },
      // ── ADDED VIA ADMIN PANEL ─────────────────────────────────
      { id:1782239194, name:"Boxer Shirt", category:"clothes", brand:"", price:"₹399", priceVal:399, desc:"Boxer full sleeve shirt with back print", image:"boxer3.jpeg", images: ["boxer3.jpeg", "boxer3.jpeg"], emoji:"👕", sizes: [] },
      // ── ADDED VIA ADMIN PANEL ─────────────────────────────────
      { id:1782239147, name:"Boxer Shirt", category:"clothes", brand:"", price:"₹399", priceVal:399, desc:"Boxer full sleeve shirt with back print", image:"boxer2.jpeg", images: ["boxer2.jpeg", "boxer2.jpeg"], emoji:"👕", sizes: [] },
      // ── ADDED VIA ADMIN PANEL ─────────────────────────────────
      { id:1782239054, name:"Boxer Shirt", category:"clothes", brand:"", price:"₹399", priceVal:399, desc:"Boxer full sleeve shirt with back print", image:"boxer1.jpeg", images: ["boxer1.jpeg", "boxer1.jpeg"], emoji:"👕", sizes: [] },
     
      { id:1, name:"New Balance x Kith",  category:"shoes",   brand:"New Balance", price:"₹2,699", priceVal:2499, desc:"Limited edition NB x Kith collab in bold orange.", image:"kith1.jpg", emoji:"👟" },     
      { id:2, name:"Velvet Slip-On",     category:"shoes",   brand:"Adidas",       price:"₹1,899", priceVal:1899, desc:"Minimalist slip-on in premium velvet finish.",       image:"", emoji:"👠" },
      { id:3, name:"High-Top Canvas",    category:"shoes",   brand:"Nike",         price:"₹2,199", priceVal:2199, desc:"Classic high-top in unbleached canvas.",              image:"", emoji:"👟" },
      { id:4, name:"Oversize Linen Tee", category:"clothes", brand:"H&M",          price:"₹799",   priceVal:799,  desc:"Relaxed fit, breathable linen blend.",                image:"", emoji:"👕" },
      { id:5, name:"Cargo Wide Pants",   category:"clothes", brand:"Zara",         price:"₹1,399", priceVal:1399, desc:"Utility pockets, wide leg silhouette. S/M/L.",        image:"", emoji:"👖" },
      { id:6, name:"Knit Zip Hoodie",    category:"clothes", brand:"Puma",         price:"₹1,699", priceVal:1699, desc:"Ribbed knit hoodie with front zip. Unisex.",          image:"", emoji:"👕" },
    ];

    const pid = parseInt(new URLSearchParams(window.location.search).get("id") || "1");
    const raw = products.find(p => p.id === pid) || products[0];

    const product = {
      name:     raw.name,
      brand:    raw.brand || raw.category,
      price:    raw.price,
      category: raw.category,
      avail:    "In Stock",
      desc:     raw.desc,
      emoji:    raw.emoji,
      sizes:    raw.sizes || [],
      images: (function() {
        if (raw.images && raw.images.length > 0) return raw.images;
        if (raw.image) return [raw.image];
        return [];
      })(),
      details: [
        { key: "Category", val: (raw.category || "General").toUpperCase() },
        { key: "Authentic", val: "100% Verified" },
        { key: "Shipping", val: "Calculated at checkout" }
      ]
    };

    let currentSlideIndex = 0;

    function fillPage() {
      document.title = `${product.name} — 3posher`;

      const track = document.getElementById('gallery-track');
      if (product.images.length > 0) {
        track.innerHTML = product.images.map(img => `
          <div class="gallery-slide">
            <img src="${img}" alt="${product.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div class="placeholder-emoji" style="display:none;">${product.emoji}</div>
          </div>
        `).join('');
      } else {
        track.innerHTML = `
          <div class="gallery-slide">
            <div class="placeholder-emoji">${product.emoji}</div>
          </div>
        `;
      }

      buildDots();
      updateGalleryArrows();

      // Size Grid Dynamic Fallback Rendering
      const sizeGrid = document.getElementById('size-grid');
      if (product.sizes && product.sizes.length > 0) {
        sizeGrid.innerHTML = product.sizes.map(s =>
          `<button class="size-btn" onclick="selectSize(this)">${s}</button>`
        ).join('');
      } else {
        sizeGrid.innerHTML = `<span style="color: #888; font-size: 0.85rem;">Standard Size (One Size)</span>`;
      }

      document.getElementById("product-brand").textContent = product.brand.toUpperCase();
      document.getElementById("product-name").textContent = product.name;
      document.getElementById("product-price").textContent = product.price;
      document.getElementById("product-avail").textContent = product.avail;
      document.getElementById("product-desc").textContent = product.desc;

      const table = document.getElementById("details-table");
      table.innerHTML = product.details.map(row => `
        <div class="detail-row">
          <span class="detail-key">${row.key}</span>
          <span class="detail-val">${row.val}</span>
        </div>
      `).join('');
    }

    function selectSize(button) {
      document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');
    }

    function buildDots() {
      const dotsContainer = document.getElementById('gallery-dots');
      if (product.images.length <= 1) {
        dotsContainer.innerHTML = '';
        return;
      }
      dotsContainer.innerHTML = product.images.map((_, i) => `
        <div class="gallery-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></div>
      `).join('');
    }

    function updateGalleryArrows() {
      const prev = document.getElementById('arrow-prev');
      const next = document.getElementById('arrow-next');
      if (product.images.length <= 1) {
        prev.classList.add('hidden');
        next.classList.add('hidden');
        return;
      }
      if (currentSlideIndex === 0) prev.classList.add('hidden');
      else prev.classList.remove('hidden');

      if (currentSlideIndex === product.images.length - 1) next.classList.add('hidden');
      else next.classList.remove('hidden');
    }

    function goToSlide(index) {
      currentSlideIndex = index;
      const track = document.getElementById('gallery-track');
      track.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
      
      const dots = document.querySelectorAll('.gallery-dot');
      dots.forEach((dot, i) => {
        if (i === currentSlideIndex) dot.classList.add('active');
        else dot.classList.remove('active');
      });

      updateGalleryArrows();
    }

    function nextSlide() {
      if (currentSlideIndex < product.images.length - 1) {
        goToSlide(currentSlideIndex + 1);
      }
    }

    function prevSlide() {
      if (currentSlideIndex > 0) {
        goToSlide(currentSlideIndex - 1);
      }
    }

    let touchStartX = 0;
    let touchEndX = 0;
    const galleryEl = document.getElementById('gallery');

    galleryEl.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});

    galleryEl.addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, {passive: true});

    function handleSwipe() {
      const threshold = 40;
      if (touchStartX - touchEndX > threshold) nextSlide();
      if (touchEndX - touchStartX > threshold) prevSlide();
    }

    function getSelectedSize() {
      const activeBtn = document.querySelector('.size-btn.active');
      return activeBtn ? activeBtn.textContent : null;
    }

    function enquireOnWhatsApp() {
      const chosenSize = getSelectedSize();
      let sizeText = "";
      if (product.sizes && product.sizes.length > 0) {
        if (!chosenSize) {
          alert("Please select a size first!");
          return;
        }
        sizeText = `\nSize: ${chosenSize}`;
      }
      
      const message = `Hello, I'm interested in buying:\n\n*${product.name}*\nBrand: ${product.brand}\nPrice: ${product.price}${sizeText}\n\nLink: ${window.location.href}`;
      const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
      window.open(url, '_blank');
    }

    function shareProduct() {
      if (navigator.share) {
        navigator.share({
          title: product.name,
          text: `Check out ${product.name} on 3posher!`,
          url: window.location.href
        }).catch(() => {});
      } else {
        copyLink();
      }
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById('copy-btn');
        const origText = btn.innerHTML;
        btn.innerText = "Copied!";
        setTimeout(() => { btn.innerHTML = origText; }, 2000);
      });
    }

    window.onload = fillPage;
  </script>

</body>
</html>
